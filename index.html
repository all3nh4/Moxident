<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZSTV1QEQNN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZSTV1QEQNN');
  </script>
  <title>Moxident</title>
  <script>
    (function () {
      const AB_STORAGE_KEY = 'mox_ab_variant';
      const AB_SPLIT_B = 0.5;
      const params = new URLSearchParams(window.location.search);
      const override = params.get('ab');
      const forcedVariant = override === 'A' || override === 'B' ? override : '';
      const storedVariant = localStorage.getItem(AB_STORAGE_KEY);
      const assignedVariant = forcedVariant || storedVariant || (Math.random() < AB_SPLIT_B ? 'B' : 'A');
      const targetPath = assignedVariant === 'B' ? '/index-b.html' : '/index-a.html';

      localStorage.setItem(AB_STORAGE_KEY, assignedVariant);
      gtag('event', 'ab_variant_assigned', { variant: assignedVariant });
      window.location.replace(targetPath + window.location.search);
    })();
  </script>
</head>
<body></body>
</html>
