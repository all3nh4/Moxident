<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moxident</title>
  <script>
(async function () {

  const params = new URLSearchParams(window.location.search);
  const forced = params.get('ab');

  let variant = null;

  // manual override
  if (forced === 'A' || forced === 'B') {
    variant = forced;
    localStorage.setItem('ab_variant', variant);
    console.log('AB forced variant:', variant);
  } else {
    variant = localStorage.getItem('ab_variant');
    console.log('AB stored variant:', variant);
  }

  // if no stored variant → fetch config
  if (!variant) {
    let split = 0.5; // fallback

    try {
      const res = await fetch('/config.json', { cache: 'no-store' });
      console.log('AB config status:', res.status);


    
      const data = await res.json();
      if (typeof data.split === 'number') {
        split = data.split;
      }
    } catch (e) {
      console.log('AB config fetch failed, using fallback 0.5', e);
    }

    variant = Math.random() < split ? 'A' : 'B';
    localStorage.setItem('ab_variant', variant);
    console.log('AB assigned split:', split);
    console.log('AB assigned variant:', variant);
  }

  // route
  if (variant === 'A') {
    window.location.replace('/index-a.html');
  } else {
    window.location.replace('/index-b.html');
  }

})();
</script>
</head>
<body></body>
</html>
