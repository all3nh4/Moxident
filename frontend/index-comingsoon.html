<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moxident — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/styles.css"/>
  <style>
    .coming-wrap {
      min-height: calc(100vh - 58px);
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    .coming-inner { text-align: center; max-width: 500px; }
    .coming-title {
      font-family: var(--serif);
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 900; line-height: 1.1;
      margin-bottom: 16px;
    }
    .coming-title em { font-style: italic; color: var(--red); }
    .coming-sub { font-size: 1rem; color: var(--ink2); line-height: 1.65; margin-bottom: 40px; }
    .coming-divider { height: 1px; background: var(--bdr); margin: 40px 0; }
    .coming-dentist-label {
      font-size: 11px; font-weight: 700; letter-spacing: .09em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 16px;
    }
    .coming-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .coming-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; border-radius: var(--rad-lg);
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: all .15s;
      font-family: var(--sans);
    }
    .coming-link-primary {
      background: var(--red); color: #fff; border: none;
      box-shadow: 0 4px 16px rgba(200,40,30,.28);
    }
    .coming-link-primary:hover { background: var(--red-h); transform: translateY(-1px); }
    .coming-link-secondary {
      background: var(--white); color: var(--ink);
      border: 1.5px solid var(--bdr);
    }
    .coming-link-secondary:hover { border-color: var(--bdr2); background: var(--paper); }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="main-nav">
  <a class="nav-logo" href="/">
    <div class="nav-dot"></div>Moxident
  </a>
  <div class="nav-pills">
    <button class="nav-pill" onclick="window.location.href='/dentist/join/'">Join Network</button>
    <button class="nav-pill" onclick="window.location.href='/dentist/'">Dentist Survey</button>
  </div>
  <button class="hamburger" id="hamburger" aria-label="Menu" onclick="toggleDrawer()">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- Mobile Drawer -->
<div class="nav-drawer" id="nav-drawer">
  <div class="drawer-section">For Dentists</div>
  <button class="drawer-pill" onclick="window.location.href='/dentist/join/';closeDrawer()">🦷 Join the Network</button>
  <button class="drawer-pill" onclick="window.location.href='/dentist/';closeDrawer()">📋 Dentist Survey</button>
</div>

<!-- COMING SOON -->
<div class="coming-wrap">
  <div class="coming-inner">
    <div class="eyebrow a1"><div class="eyebrow-dot"></div>Seattle Area</div>
    <h1 class="coming-title a2">Emergency dental routing<br><em>coming soon.</em></h1>
    <p class="coming-sub a3">We're putting the finishing touches on the service. Patients will be matched with available local dentists via SMS — confirmed in minutes.</p>

    <div class="coming-divider"></div>

    <div class="coming-dentist-label a4">Are you a dentist?</div>
    <div class="coming-links a4">
      <a class="coming-link coming-link-primary" href="/dentist/join/">
        Join the Network →
      </a>
      <a class="coming-link coming-link-secondary" href="/dentist/survey/">
        Take the Survey
      </a>
    </div>
  </div>
</div>

<script>
  function toggleDrawer() {
    document.getElementById('nav-drawer').classList.toggle('open');
    document.getElementById('hamburger').classList.toggle('open');
  }
  function closeDrawer() {
    document.getElementById('nav-drawer').classList.remove('open');
    document.getElementById('hamburger').classList.remove('open');
  }
</script>

</body>
</html>
