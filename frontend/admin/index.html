<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moxident Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/styles/admin.css"/>
</head>
<body class="page-login">

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-dot"></div>Moxident
        <span class="login-logo-tag">Admin</span>
      </div>
      <div class="login-title">Welcome back.</div>
      <div class="login-sub">Sign in with your Moxident Google Workspace account to access the admin portal.</div>
      <div class="login-btn-wrap" id="google-signin-btn"></div>
      <div class="login-err hidden" id="login-err" role="alert"></div>
    </div>
  </div>

  <!-- GIS must load before auth.js initializes the button -->
  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
