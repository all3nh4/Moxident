<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Report — Moxident Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/admin.css"/>
</head>
<body>

  <div id="admin-nav-host"></div>

  <main class="page-wrap">
    <div class="page-header fade-up">
      <div class="page-title">Dentist Survey Report</div>
      <div class="page-sub">All dentist survey submissions from the /dentist-survey/report endpoint.</div>
    </div>

    <div id="report-error" class="alert alert-err hidden"></div>
    <div id="report-kpis" class="kpi-grid" style="margin-bottom:28px;"></div>
    <div id="report-body">
      <div class="spinner-wrap"><div class="spinner"></div> Loading report…</div>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/report.js"></script>
</body>
</html>
