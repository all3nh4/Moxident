<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Moxident</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css">
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <span class="nav-logo-dot"></span> Moxident
      </a>
    </div>
  </nav>

  <main class="portal-wrap">
    <div class="portal-card">
      <h1 class="portal-h1">Reset Password</h1>
      <p class="portal-sub">Enter your email and we'll send you a link to reset your password.</p>

      <form id="forgot-form" onsubmit="return handleForgotPassword(event)">
        <label class="portal-label" for="forgot-email">Email</label>
        <input class="portal-input" type="email" id="forgot-email" required placeholder="you@practice.com">

        <button class="portal-btn" type="submit" id="forgot-btn">Send Reset Link</button>
      </form>

      <div id="forgot-success" class="portal-success hidden">
        Check your email for a password reset link.
      </div>

      <div id="forgot-error" class="portal-error hidden"></div>

      <div class="portal-links">
        <a href="index.html" class="portal-link">Back to login</a>
      </div>
    </div>
  </main>

  <script type="module" src="portal.mjs"></script>
</body>
</html>
