<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Moxident</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css">
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <span class="nav-logo-dot"></span> Moxident
      </a>
    </div>
  </nav>

  <main class="portal-wrap">
    <div class="portal-card">
      <h1 class="portal-h1">Set New Password</h1>
      <p class="portal-sub">Choose a new password for your Moxident portal account.</p>

      <form id="reset-form" onsubmit="return handleResetPassword(event)">
        <label class="portal-label" for="reset-password">New Password</label>
        <input class="portal-input" type="password" id="reset-password" required placeholder="Min 8 characters" minlength="8">

        <label class="portal-label" for="reset-confirm">Confirm Password</label>
        <input class="portal-input" type="password" id="reset-confirm" required placeholder="Re-enter password" minlength="8">

        <button class="portal-btn" type="submit" id="reset-btn">Reset Password</button>
      </form>

      <div id="reset-success" class="portal-success hidden">
        Password updated. <a href="index.html" class="portal-link">Sign in now</a>
      </div>

      <div id="reset-error" class="portal-error hidden"></div>
    </div>
  </main>

  <script type="module" src="portal.mjs"></script>
</body>
</html>
