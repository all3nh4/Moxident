<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Password — Moxident</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css">
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <span class="nav-logo-dot"></span> Moxident
      </a>
    </div>
  </nav>

  <main class="portal-wrap">
    <div class="portal-card">
      <h1 class="portal-h1">Set Your Password</h1>
      <p class="portal-sub">Create a password to access your Moxident dentist portal.</p>

      <form id="set-password-form" onsubmit="return handleSetPassword(event)">
        <label class="portal-label" for="sp-password">Password</label>
        <input class="portal-input" type="password" id="sp-password" required placeholder="Min 8 characters" minlength="8">

        <label class="portal-label" for="sp-confirm">Confirm Password</label>
        <input class="portal-input" type="password" id="sp-confirm" required placeholder="Re-enter password" minlength="8">

        <button class="portal-btn" type="submit" id="sp-btn">Set Password</button>
      </form>

      <div id="sp-error" class="portal-error hidden"></div>
    </div>
  </main>

  <script type="module" src="portal.mjs"></script>
</body>
</html>
